services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repolens
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
    volumes:
      - repolens-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/repolens-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - repolens-neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      REPOLENS_INDEX_DIR: /data/indexes
      DATABASE_URL: postgresql://repolens:repolens@postgres:5432/repolens
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: repolens-password
    volumes:
      - ${REPOLENS_SCAN_ROOT:-.}:/repo:ro
      - repolens-indexes:/data/indexes
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  repolens-postgres:
  repolens-neo4j:
  repolens-indexes:
